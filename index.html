<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/logo-original.png" />
    <link rel="apple-touch-icon" href="/images/logo-original.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plateforme SaaS Universitaire Premium" />
    <meta name="author" content="Kouakou Atsé Mondésire" />
    <meta name="developer" content="Kouakou Atsé Ismael Mondésire" />
    <meta name="theme-color" content="#863bff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Campus - SaaS Universitaire</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // En développement : désinscrire tous les SW pour éviter le cache cassé
          if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
            navigator.serviceWorker.getRegistrations().then(regs => {
              regs.forEach(reg => reg.unregister());
            });
          } else {
            // Production uniquement
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('PWA Service Worker enregistré :', reg.scope))
              .catch(err => console.error('Erreur d\'enregistrement du Service Worker :', err));
          }
        });
      }
    </script>
    <script>
      (function () {
        var key = 'campus-theme';
        var stored = localStorage.getItem(key);
        var mode = 'light';
        try {
          var parsed = stored ? JSON.parse(stored) : null;
          var saved = parsed && parsed.state && parsed.state.mode ? parsed.state.mode : 'light';
          mode = saved === 'dark' ? 'dark' : 'light';
        } catch (e) {}
        var theme = mode === 'dark' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-app text-content antialiased min-h-screen transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
